# ================================================================
# REDIRECT HTTP -> HTTPS
# ================================================================
server {
    listen 80;
    listen [::]:80;
    server_name mimoskorea.com.br www.mimoskorea.com.br;
    return 301 https://$host$request_uri;
}

# ================================================================
# SERVIDOR PRINCIPAL: WordPress + Next.js Proxies
# Hosts:
#   /                          -> WordPress (php-fpm)
#   /api/                      -> mimoskorea-data-analysis :3001 (legacy)
#   /mimoskorea-data-analysis  -> Next.js :3001 (privado, noindex)
#   /shop                      -> Next.js :3002 (catalogo, publico)
# ================================================================
server {
    server_name mimoskorea.com.br www.mimoskorea.com.br;

    root /home/fjallstoppur/mimoskorea-wordpress;
    index index.php index.html;

    # ============================================================
    # LOGS
    # ============================================================
    access_log /var/log/nginx/mimoskorea-access.log;
    error_log  /var/log/nginx/mimoskorea-error.log;

    # ============================================================
    # SSL
    # ============================================================
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    ssl_certificate     /etc/letsencrypt/live/mimoskorea.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mimoskorea.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ============================================================
    # HEADERS DE SEGURANCA
    # ============================================================
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy   "default-src 'self' http: https: ws: wss: data: blob: 'unsafe-inline' 'unsafe-eval'" always;

    # ============================================================
    # LIMITES
    # ============================================================
    client_max_body_size 64M;

    # ============================================================
    # GZIP
    # ============================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml application/atom+xml image/svg+xml;

    # ============================================================
    # SEGURANCA: bloquear arquivos sensiveis
    # ============================================================
    location ~ /\.(?!well-known).* { deny all; }
    location ~* /(?:uploads|files)/.*\.php$ { deny all; }
    location ~* ^/wp-content/.*\.(txt|md|exe|sh|bak|log|sql|old|tgz|tar|zip|gz)$ { deny all; }

    # ============================================================
    # NEXT.JS PROXY - /api/ (legacy: rewrite p/ data-analysis)
    #
    # IMPORTANTE: O modificador ^~ garante prioridade sobre regex.
    # Este bloco intercepta /api/* da raiz e manda pro app de
    # analise. NAO afeta /shop/api/* (basePath = /shop), que cai
    # no bloco `^~ /shop` abaixo.
    # ============================================================
    location ^~ /api/ {
        rewrite ^/api/(.*)$ /mimoskorea-data-analysis/api/$1 break;
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ============================================================
    # NEXT.JS PROXY - /mimoskorea-data-analysis (privado)
    # ============================================================
    location ^~ /mimoskorea-data-analysis {
        # noindex, nofollow, noarchive: nao indexar nem cachear
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        access_log /var/log/nginx/mimoskorea-data-analysis.access.log;
        error_log  /var/log/nginx/mimoskorea-data-analysis.error.log;
    }

    # ============================================================
    # NEXT.JS PROXY - /shop (catalogo Mimos Korea Design, publico)
    #
    # App: mimoskorea-shop (Next.js 16)
    # Build com NEXT_PUBLIC_BASE_PATH=/shop, roda em :3002.
    # Cobre /shop/*, /shop/_next/*, /shop/api/*, /shop/sitemap.xml,
    # /shop/robots.txt, /shop/icon, /shop/opengraph-image, etc.
    # NAO leva header noindex: catalogo deve ser indexado.
    # ============================================================
    location ^~ /shop {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        access_log /var/log/nginx/mimoskorea-shop.access.log;
        error_log  /var/log/nginx/mimoskorea-shop.error.log;
    }

    # ============================================================
    # ASSETS ESTATICOS DO WORDPRESS (cache 30 dias)
    # Regex aplica apenas a rotas que NAO caem nos ^~ acima.
    # ============================================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ============================================================
    # LOGS SILENCIOSOS PARA PLUGINS WORDPRESS
    # ============================================================
    location ~* /wp-content/plugins/js_composer/.*\.css$ { access_log off; log_not_found off; }
    location ~* /wp-content/plugins/js_composer/.*\.js$  { access_log off; log_not_found off; }

    # ============================================================
    # ADMIN-AJAX DO WORDPRESS
    # ============================================================
    location = /wp-admin/admin-ajax.php {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
        fastcgi_intercept_errors off;
        fastcgi_ignore_client_abort off;
    }

    # ============================================================
    # ROTA RAIZ DO WORDPRESS
    # ============================================================
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # ============================================================
    # PHP-FPM PARA WORDPRESS
    # ============================================================
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
        fastcgi_intercept_errors off;
    }
}
